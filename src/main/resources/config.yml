# DiscordBoostRank Configuration - Full Automation Edition

# ==============================================
# BOOST RANK TIERS
# ==============================================
# Configure multiple rank tiers based on boost count
# Players will receive the highest rank they qualify for
boost-ranks:
  tier1:
    name: "booster"           # Group name in LuckPerms
    required-boosts: 1        # Requires at least 1 boost
    priority: 1               # Lower priority = higher rank
    
  tier2:
    name: "SuperBooster"
    required-boosts: 2
    priority: 2
    
  tier3:
    name: "MegaBooster"
    required-boosts: 3
    priority: 3

# ==============================================
# AUTO-CREATION
# ==============================================
# Automatically create groups in LuckPerms if they don't exist
auto-create-groups:
  enabled: true
  # Permissions that will be automatically added to the group
  default-permissions:
    - "cmi.command.fly"
    - "cmi.command.repair"
    - "cmi.command.chatcolor"
  # Prefix for each tier
  prefixes:
    Booster: "&d[Booster] &r"
    SuperBooster: "&5[Super Booster] &r"
    MegaBooster: "&c[MEGA Booster] &r"

# ==============================================
# AUTO CHECK & SYNC
# ==============================================
# Automatically check boost status
auto-check:
  # When a player joins the server
  on-player-join: true
  
  # Periodically sync all online players
  periodic-sync:
    enabled: true
    interval-minutes: 15  # Check every 15 minutes
    
  # Check all players (including offline)
  full-sync:
    enabled: true
    interval-minutes: 60  # Check every 1 hour

# ==============================================
# AUTO RANK REMOVAL
# ==============================================
# Automatically remove rank when player stops boosting
auto-remove:
  enabled: true
  # Grace period - allow X extra minutes before removing rank
  # (In case a boost is accidentally cancelled)
  grace-period-minutes: 5
  
  # Notify before removal
  notify-before-removal: true
  warning-minutes: 1440  # 24 hours

# ==============================================
# AUTO ACCOUNT LINK REMINDER
# ==============================================
# Automatically remind players to link their Discord account
link-reminder:
  enabled: true
  # Remind when joining the server
  on-join: true
  # Remind periodically while playing
  periodic:
    enabled: true
    interval-minutes: 30
  # Only remind X times, then stop
  max-reminders: 3

# ==============================================
# AUTO NOTIFICATIONS
# ==============================================
notifications:
  # In-game notifications
  in-game:
    rank-granted: "&a&l✓ &aYou have received the &e{rank} &arank for boosting our Discord server!"
    rank-upgraded: "&a&l⬆ &aYour rank has been upgraded to &e{rank} &awith {boosts} boosts!"
    rank-removed: "&c&l✗ &cYour &e{rank} &crank has expired (you stopped boosting Discord)"
    rank-warning: "&e&l⚠ &eYour boost is about to expire! Boost again to keep your rank."
    link-reminder: "&e&l→ &eLink your Discord account to receive the Booster rank! &7/discord link"
    
  # Discord notifications
  discord:
    enabled: true
    # Channel ID to send notifications to (leave empty to disable)
    channel-id: ""
    
    # Embed messages
    messages:
      rank-granted:
        title: "🎉 New Booster!"
        description: "**{player}** just boosted the server and received the **{rank}** rank!"
        color: "5865F2"  # Discord blurple
        
      rank-upgraded:
        title: "⬆️ Rank Upgraded!"
        description: "**{player}** has reached the **{rank}** rank with **{boosts}** boosts!"
        color: "57F287"  # Green

      rank-removed:
        title: "💔 Boost Expired"
        description: "**{player}**'s boost has expired. We'll miss you!"
        color: "ED4245"  # Red

# ==============================================
# AUTO REWARDS
# ==============================================
# Automatically execute commands when a rank is granted
auto-rewards:
  enabled: true
  
  # Commands to run when rank is GRANTED (executed with console permission)
  on-grant:
    - "money give {player} 10000"
    - "give {player} diamond 5"
    
  # Commands to run when rank is REMOVED
  on-remove:
    - "tellraw {player} {\"text\":\"Thank you for boosting! ❤️\",\"color\":\"red\"}"

# ==============================================
# AUTO STATISTICS
# ==============================================
# Automatically track statistics
statistics:
  enabled: true
  # Save data to file
  save-to-file: true
  file-path: "plugins/DiscordBoostRank/stats.yml"
  
  # What to track
  track:
    - "total-boosters"            # Total number of boosters
    - "total-boosts-received"     # Total boosts received
    - "boost-history"             # Boost history per player
    - "current-tier-distribution" # Current tier distribution

# ==============================================
# AUTO BACKUP
# ==============================================
# Automatically backup data
backup:
  enabled: true
  interval-hours: 24
  max-backups: 7  # Keep the 7 most recent backups
  backup-path: "plugins/DiscordBoostRank/backups/"

# ==============================================
# ADVANCED SETTINGS
# ==============================================
advanced:
  # Automatically fix rank conflicts (if player has multiple boost ranks)
  auto-fix-conflicts: true
  
  # Automatically migrate data from old UUID to new
  auto-migrate-uuid: true
  
  # Automatically retry if Discord API fails
  auto-retry:
    enabled: true
    max-attempts: 3
    delay-seconds: 5
  
  # Cache to reduce API calls
  cache:
    enabled: true
    duration-minutes: 5

# ==============================================
# DEBUG & LOGGING
# ==============================================
debug: false

# Logging level
logging:
  level: "INFO"  # DEBUG, INFO, WARN, ERROR
  log-to-file: true
  file-path: "plugins/DiscordBoostRank/logs/"
  
# Verbose logging (more detailed)
verbose:
  boost-events: false
  rank-changes: true
  api-calls: false
  player-joins: false
