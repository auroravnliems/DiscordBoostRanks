# DiscordBoostRank Configuration - Full Automation Edition

# ==============================================
# BOOST RANK TIERS
# ==============================================
# Cấu hình nhiều tier rank dựa trên số lượng boost
# Player sẽ nhận rank cao nhất mà họ đủ điều kiện
boost-ranks:
  tier1:
    name: "booster"           # Tên group trong LuckPerms
    required-boosts: 1        # Cần ít nhất 1 boost
    priority: 1               # Priority thấp hơn = rank cao hơn
    
  tier2:
    name: "SuperBooster"
    required-boosts: 2
    priority: 2
    
  tier3:
    name: "MegaBooster"
    required-boosts: 3
    priority: 3

# ==============================================
# AUTO-CREATION
# ==============================================
# Tự động tạo groups trong LuckPerms nếu chưa tồn tại
auto-create-groups:
  enabled: true
  # Permissions sẽ được tự động thêm vào group
  default-permissions:
    - "cmi.command.fly"
    - "cmi.command.repair"
    - "cmi.command.chatcolor"
  # Prefix cho mỗi tier
  prefixes:
    Booster: "&d[Booster] &r"
    SuperBooster: "&5[Super Booster] &r"
    MegaBooster: "&c[MEGA Booster] &r"

# ==============================================
# TỰ ĐỘNG KIỂM TRA & ĐỒNG BỘ
# ==============================================
# Tự động kiểm tra boost status
auto-check:
  # Khi người chơi tham gia server
  on-player-join: true
  
  # Đồng bộ định kỳ tất cả người chơi online
  periodic-sync:
    enabled: true
    interval-minutes: 15  # Kiểm tra mỗi 15 phút
    
  # Kiểm tra tất cả players (kể cả offline) 
  full-sync:
    enabled: true
    interval-minutes: 60  # Kiểm tra mỗi 1 giờ

# ==============================================
# TỰ ĐỘNG XÓA RANK
# ==============================================
# Tự động xóa rank khi không boost nữa
auto-remove:
  enabled: true
  # thời gian ân hạn - cho thêm X phút trước khi xóa rank
  # (Phòng trường hợp boost bị cancel nhầm)
  grace-period-minutes: 5
  
  # Thông báo trước khi xóa
  notify-before-removal: true
  warning-minutes: 1440  # 24 giờ

# ==============================================
# TỰ ĐỘNG NHẮC NHỞ LINK TÀI KHOẢN
# ==============================================
# Tự động nhắc người chơi link tài khoản Discord
link-reminder:
  enabled: true
  # Nhắc khi tham gia server
  on-join: true
  # Nhắc định kỳ khi chơi
  periodic:
    enabled: true
    interval-minutes: 30
  # Chỉ nhắc X lần, sau đó dừng
  max-reminders: 3

# ==============================================
# TỰ ĐỘNG THÔNG BÁO
# ==============================================
notifications:
  # Thông báo trong game
  in-game:
    rank-granted: "&a&l✓ &aBạn đã nhận được hạng &e{rank} &anhờ đóng góp Boost Discord!"
    rank-upgraded: "&a&l⬆ &aHạng của bạn đã được nâng lên &e{rank} &avới {boosts} lần Boost!"
    rank-removed: "&c&l✗ &cHạng &e{rank} &ccủa bạn đã hết hạn (do dừng Boost Discord)"
    rank-warning: "&e&l⚠ &eLượt Boost của bạn sắp hết hạn! Hãy Boost lại để duy trì hạng nhé."
    link-reminder: "&e&l→ &eHãy liên kết Discord để nhận hạng Booster! &7/discord link"
    
  # Thông báo trên Discord
  discord:
    enabled: true
    # Channel ID để gửi thông báo (để trống = disable)
    channel-id: ""
    
    # Embed messages
    messages:
      rank-granted:
        title: "🎉 Booster Mới!"
        description: "**{player}** vừa boost cho server và nhận được rank **{rank}**!"
        color: "5865F2"  # Discord blurple
        
      rank-upgraded:
        title: "⬆️ Thăng Hạng!"
        description: "**{player}** hiện đã đạt hạng **{rank}** với **{boosts}** lượt boost!"
        color: "57F287"  # Green

      rank-removed:
        title: "💔 Hết Hạn Boost"
        description: "Lượt boost của **{player}** đã hết hạn. Chúng mình sẽ nhớ bạn lắm đó!"
        color: "ED4245"  # Red

# ==============================================
# PHẦN THƯỞNG TỰ ĐỘNG
# ==============================================
# Tự động thực thi commands khi nhận rank
auto-rewards:
  enabled: true
  
  # Commands chạy khi NHẬN rank (chạy với quyền console)
  on-grant:
    - "money give {player} 10000"
    - "give {player} diamond 5"
    
  # Lệnh chạy khi MẤT rank
  on-remove:
    - "tellraw {player} {\"text\":\"Cảm ơn bạn đã Boost! ❤️\",\"color\":\"red\"}"

# ==============================================
# TỰ ĐỘNG THỐNG KÊ
# ==============================================
# Tự động theo dõi thống kê
statistics:
  enabled: true
  # Lưu data vào file
  save-to-file: true
  file-path: "plugins/DiscordBoostRank/stats.yml"
  
  # Track những gì
  track:
    - "total-boosters"          # Tổng số người boost
    - "total-boosts-received"   # Tổng số boost nhận được
    - "boost-history"           # Lịch sử boost của mỗi player
    - "current-tier-distribution" # Phân bố tier hiện tại

# ==============================================
# TỰ ỘNG SAO LƯU
# ==============================================
# Tự động backup dữ liệu
backup:
  enabled: true
  interval-hours: 24
  max-backups: 7  # Giữ 7 bản backup gần nhất
  backup-path: "plugins/DiscordBoostRank/backups/"

# ==============================================
# CÀI ĐẶT NÂNG CAO
# ==============================================
advanced:
  # Tự động fix rank conflicts (nếu player có nhiều boost rank)
  auto-fix-conflicts: true
  
  # Tự động migrate data từ UUID cũ sang mới
  auto-migrate-uuid: true
  
  # Tự động thử lại nếu Discord API fail
  auto-retry:
    enabled: true
    max-attempts: 3
    delay-seconds: 5
  
  # Cache để giảm API calls
  cache:
    enabled: true
    duration-minutes: 5

# ==============================================
# DEBUG & LOGGING
# ==============================================
debug: false

# Logging level
logging:
  level: "INFO"  # DEBUG, INFO, WARN, ERROR
  log-to-file: true
  file-path: "plugins/DiscordBoostRank/logs/"
  
# Verbose logging (chi tiết hơn)
verbose:
  boost-events: false
  rank-changes: true
  api-calls: false
  player-joins: false
